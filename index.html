// ─── WAKE LOCK ────────────────────────────────────────────────────────────
let wakeLock = null;
let wakeLockEnabled = false;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => {
      // Re-acquire if user still wants it and page is visible
      if (wakeLockEnabled && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });
    updateWakeLockUI(true);
  } catch(e) {
    updateWakeLockUI(false);
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  updateWakeLockUI(false);
}

function updateWakeLockUI(active) {
  const btn   = document.getElementById('wake-lock-btn');
  const icon  = document.getElementById('wake-lock-icon');
  const label = document.getElementById('wake-lock-label');
  if (!btn) return;
  if (active) {
    btn.classList.add('active');
    icon.textContent  = '🔆';
    label.textContent = 'Awake';
  } else {
    btn.classList.remove('active');
    icon.textContent  = '🔅';
    label.textContent = 'Sleep';
  }
}

async function toggleWakeLock() {
  wakeLockEnabled = !wakeLockEnabled;
  if (wakeLockEnabled) { await requestWakeLock(); }
  else { releaseWakeLock(); }
}

// Re-acquire wake lock when tab becomes visible again (e.g. switching back from another app)
document.addEventListener('visibilitychange', () => {
  if (wakeLockEnabled && document.visibilityState === 'visible') requestWakeLock();
});

// ─── EXERCISE TIMER ──────────────────────────────────────────────────────
const timerState = {};

function timerHtml(uid) {
  return `<div class="timer-widget" id="timer-${uid}">
    <div class="timer-display" id="timer-display-${uid}">0:00.0</div>
    <button class="timer-btn" id="timer-toggle-${uid}" onclick="timerToggle('${uid}')">Start</button>
    <button class="timer-btn reset" onclick="timerReset('${uid}')">Reset</button>
  </div>`;
}

function timerToggle(uid) {
  if (!timerState[uid]) timerState[uid] = { running: false, elapsed: 0, startedAt: null };
  const t = timerState[uid];
  if (t.running) {
    clearInterval(t.interval);
    t.elapsed += Date.now() - t.startedAt;
    t.running = false;
    document.getElementById(`timer-toggle-${uid}`).textContent = 'Start';
    document.getElementById(`timer-display-${uid}`).classList.remove('running');
  } else {
    t.startedAt = Date.now();
    t.running = true;
    document.getElementById(`timer-toggle-${uid}`).textContent = 'Stop';
    document.getElementById(`timer-display-${uid}`).classList.add('running');
    t.interval = setInterval(() => {
      const totalMs = t.elapsed + Date.now() - t.startedAt;
      const total   = Math.floor(totalMs / 1000);
      const ms      = Math.floor((totalMs % 1000) / 100); // one decimal
      const m = Math.floor(total / 60);
      const s = String(total % 60).padStart(2, '0');
      const el = document.getElementById(`timer-display-${uid}`);
      if (el) el.textContent = `${m}:${s}.${ms}`;
    }, 100);
  }
}

function timerReset(uid) {
  if (timerState[uid]?.interval) clearInterval(timerState[uid].interval);
  timerState[uid] = { running: false, elapsed: 0, startedAt: null };
  const display = document.getElementById(`timer-display-${uid}`);
  const toggle  = document.getElementById(`timer-toggle-${uid}`);
  if (display) { display.textContent = '0:00.0'; display.classList.remove('running'); }
  if (toggle)  toggle.textContent = 'Start';
}

// ─── SUPERSET GROUPING ───────────────────────────────────────────────────

function renderExerciseList(exs, si) {
  let html = '';
  let i = 0;
  while (i < exs.length) {
    const ex = exs[i];
    const ssGroup = ex.superset_group || null;

    if (ssGroup) {
      // Collect all consecutive exercises in this superset group
      const groupExs = [];
      let j = i;
      while (j < exs.length && exs[j].superset_group === ssGroup) {
        groupExs.push({ ex: exs[j], i: j });
        j++;
      }
      html += `<div class="ss-group">
        <div class="ss-bar"></div>
        <div class="ss-label">Superset</div>`;
      groupExs.forEach(({ ex, i: idx }) => {
        html += buildExerciseBlock(ex, idx, si);
      });
      html += `</div>`;
      i = j;
    } else {
      html += buildExerciseBlock(ex, i, si);
      i++;
    }
  }
  return html;
}

function buildExerciseBlock(ex, i, si) {
  const exName     = ex.exercise || ex.name;
  const exUnit     = ex.unit || 'kg';
  const badgeType  = ex.badge || EX_BADGES[exName] || 'acc';
  const badgeLabel = badgeType === 'anchor' ? 'Anchor' : badgeType === 'core' ? 'Core' : badgeType === 'upper' ? 'Upper' : badgeType === 'lower' ? 'Lower' : 'Acc';
  const desc       = ex.coach_notes || '';
  const uid        = `${si}_${i}`;
  const isInfo     = ex.rep_type === 'info';

  let html = `<div class="ex-block" id="ex-${uid}">
    <div class="ex-block-header" onclick="toggleEx('ex-${uid}')">
      <span class="ex-badge badge-${badgeType}">${badgeLabel}</span>
      <span class="ex-name">${exName}</span>
      <span class="ex-chevron">▼</span>
    </div>
    <div class="ex-body">`;

  if (desc) html += `<div class="ex-desc">${desc}</div>`;

  if (!isInfo) {
    html += buildSetRows(uid, ex, exUnit);
    html += `<div class="input-group">
    <label class="input-label">Notes</label>
    <input type="text" id="n_${uid}" placeholder="optional">
  </div>`;
  }

  html += `</div></div>`;
  return html;
}

// ─── SET-BY-SET HELPERS ──────────────────────────────────────────────────

// Detect whether an ex object uses timed reps
// (reused from isTimedExercise but works on program rows AND session exercises)
function isTimedEx(ex) {
  if (ex.rep_type) return ex.rep_type === 'sec' || ex.rep_type === 'min';
  const reps = (ex.reps || '').toLowerCase();
  const unit = (ex.unit || '').toLowerCase();
  return reps.includes('sec') || unit.includes('sec');
}

// Convert a legacy exercise object (old summary format) into a synthetic sets array
function legacyToSets(ex) {
  const sets = [];
  const numSets = parseInt(ex.sets) || 3;
  const weight  = parseFloat(ex.activationWeight || ex.weight) || 0;
  const topW    = parseFloat(ex.topWeight || ex.weight) || weight;
  const reps    = ex.topReps || ex.reps || '';

  if (ex.protocol && ex.activationWeight) {
    // Protocol: activation set, then top sets, then singles if any
    sets.push({ weight: parseFloat(ex.activationWeight), reps: reps });
    sets.push({ weight: topW, reps: reps });
    if (ex.singles && parseInt(ex.singles) > 0) {
      for (let i = 0; i < parseInt(ex.singles); i++) {
        sets.push({ weight: topW, reps: 1 });
      }
    }
    sets.push({ weight: parseFloat(ex.activationWeight), reps: reps });
  } else {
    for (let i = 0; i < numSets; i++) {
      sets.push({ weight: parseFloat(ex.weight) || 0, reps: ex.reps || '' });
    }
  }
  return { ...ex, sets };
}

// Build the set-rows HTML for an exercise
// ex can be a program row (has suggested_sets) or a session exercise (has sets array)
function buildSetRows(uid, ex, unit) {
  const isTimed = isTimedEx(ex);
  const repLabel = isTimed ? 'Time (s)' : 'Reps';

  // Determine initial sets data
  let sets;
  if (Array.isArray(ex.sets) && ex.sets.length) {
    // Session exercise with saved sets
    sets = ex.sets;
  } else if (Array.isArray(ex.suggested_sets) && ex.suggested_sets.length) {
    // Program row with coach suggestions
    sets = ex.suggested_sets;
  } else {
    // Fallback: 3 empty sets
    sets = [{weight: '', reps: ''}, {weight: '', reps: ''}, {weight: '', reps: ''}];
  }

  let html = `<div class="set-row-headers">
    <div></div>
    <div class="set-row-label">Weight (${unit || 'kg'})</div>
    <div class="set-row-label">${repLabel}</div>
    <div></div>
  </div>
  <div class="set-rows" id="set-rows-${uid}">`;

  sets.forEach((s, j) => {
    html += buildSetRowHtml(uid, j, s.weight ?? '', s.reps ?? '', isTimed);
  });

  html += `</div>`;

  if (isTimed) {
    html += `<div style="margin-bottom:10px"><label class="input-label">Timer</label>${timerHtml(uid)}</div>`;
  }

  html += `<button class="set-add-btn" onclick="addSet('${uid}', '${unit || 'kg'}', ${isTimed})">+ Add set</button>`;

  return html;
}

function buildSetRowHtml(uid, j, weight, reps, isTimed) {
  const wId = `set_${uid}_${j}_w`;
  const rId = `set_${uid}_${j}_r`;
  const step = 0.5;
  return `<div class="set-row" id="set-row-${uid}-${j}">
    <div class="set-row-num">${j + 1}</div>
    <div>${stepperHtml(wId, weight, 0, 300, '', step)}</div>
    <div>${isTimed
      ? stepperHtml(rId, reps, 0, 9999, '', 1)
      : stepperHtml(rId, reps, 0, 99, '')
    }</div>
    <button class="set-remove-btn" onclick="removeSet('${uid}', ${j})">×</button>
  </div>`;
}

function addSet(uid, unit, isTimed) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return;
  const j = container.children.length;
  // Copy last set's weight as default
  const lastWEl = document.getElementById(`set_${uid}_${j-1}_w`);
  const lastW = lastWEl ? lastWEl.value : '';
  container.insertAdjacentHTML('beforeend', buildSetRowHtml(uid, j, lastW, '', isTimed));
  renumberSetRows(uid);
  saveDraftFromUid(uid);
}

function removeSet(uid, j) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container || container.children.length <= 1) return;
  const row = document.getElementById(`set-row-${uid}-${j}`);
  if (row) row.remove();
  renumberSetRows(uid);
  saveDraftFromUid(uid);
}

// Extract si from uid (format: "si_exerciseIndex") and trigger saveDraft
function saveDraftFromUid(uid) {
  const si = parseInt(uid.split('_')[0]);
  if (!isNaN(si)) saveDraft(si);
}

function renumberSetRows(uid) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return;
  Array.from(container.children).forEach((row, j) => {
    // Update ID
    row.id = `set-row-${uid}-${j}`;
    // Update set number label
    const numEl = row.querySelector('.set-row-num');
    if (numEl) numEl.textContent = j + 1;
    // Update input IDs and stepper onclick attrs
    const wInput = row.querySelector(`[id^="set_${uid}_"]`);
    const inputs = row.querySelectorAll('input[type=number]');
    if (inputs[0]) inputs[0].id = `set_${uid}_${j}_w`;
    if (inputs[1]) inputs[1].id = `set_${uid}_${j}_r`;
    // Update stepper buttons
    const btns = row.querySelectorAll('.stepper-btn');
    if (btns.length >= 2) {
      btns[0].setAttribute('onclick', `stepField('set_${uid}_${j}_w',-0.5,0,300,0.5)`);
      btns[1].setAttribute('onclick', `stepField('set_${uid}_${j}_w',0.5,0,300,0.5)`);
    }
    if (btns.length >= 4) {
      btns[2].setAttribute('onclick', `stepField('set_${uid}_${j}_r',-1,0,99,1)`);
      btns[3].setAttribute('onclick', `stepField('set_${uid}_${j}_r',1,0,99,1)`);
    }
    // Update remove button
    const removeBtn = row.querySelector('.set-remove-btn');
    if (removeBtn) removeBtn.setAttribute('onclick', `removeSet('${uid}', ${j})`);
  });
}

function collectSetRows(uid) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return null; // null = never rendered, don't save to draft
  return Array.from(container.children).map((_, j) => {
    const w = document.getElementById(`set_${uid}_${j}_w`)?.value ?? '';
    const r = document.getElementById(`set_${uid}_${j}_r`)?.value ?? '';
    return { weight: w === '' ? '' : parseFloat(w), reps: r === '' ? '' : parseFloat(r) };
  });
}

function restoreSetRows(uid, ex, sets) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return;
  const isTimed = isTimedEx(ex);
  const unit = ex.unit || 'kg';
  // Rebuild the container with draft sets
  container.innerHTML = '';
  sets.forEach((s, j) => {
    container.insertAdjacentHTML('beforeend', buildSetRowHtml(uid, j, s.weight ?? '', s.reps ?? '', isTimed));
  });
}

// ─── SHARE LIFT CARD ─────────────────────────────────────────────────────
async function shareAllLifts() {
  const cards = document.querySelectorAll('.lift-card');
  if (!cards.length) { setStatus('No lift data yet', true); return; }

  const btn = document.getElementById('share-lifts-btn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

  try {
    const scale   = 2;
    const PAD     = 20;
    const GAP     = 10;
    const ROW_H   = 96;
    const W       = 340;
    const green   = '#1adb4e';
    const bg      = '#111111';
    const card_bg = '#1e1e1e';
    const txt     = '#ffffff';
    const totalH  = PAD + 24 + 8 + (cards.length * (ROW_H + GAP)) - GAP + PAD;

    const canvas = document.createElement('canvas');
    canvas.width  = W * scale;
    canvas.height = totalH * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, totalH);

    ctx.fillStyle = txt; ctx.globalAlpha = 0.35;
    ctx.font = "700 9px monospace";
    ctx.fillText("BRIAN'S TRAINING HUB  ·  ANCHOR LIFTS", PAD, PAD + 10);
    ctx.globalAlpha = 1;

    let y = PAD + 24 + 8;

    for (const card of cards) {
      // Card bg with manual rounded rect
      const r = 8;
      ctx.fillStyle = card_bg;
      ctx.beginPath();
      ctx.moveTo(PAD + r, y);
      ctx.lineTo(W - PAD - r, y);
      ctx.arcTo(W - PAD, y, W - PAD, y + r, r);
      ctx.lineTo(W - PAD, y + ROW_H - r);
      ctx.arcTo(W - PAD, y + ROW_H, W - PAD - r, y + ROW_H, r);
      ctx.lineTo(PAD + r, y + ROW_H);
      ctx.arcTo(PAD, y + ROW_H, PAD, y + ROW_H - r, r);
      ctx.lineTo(PAD, y + r);
      ctx.arcTo(PAD, y, PAD + r, y, r);
      ctx.closePath();
      ctx.fill();

      const name = (card.querySelector('.lift-name')?.textContent || '').trim();
      const val  = (card.querySelector('.lift-val')?.textContent  || '—').trim();
      const unit = (card.querySelector('.lift-val-unit')?.textContent || '').trim();

      ctx.globalAlpha = 0.45; ctx.fillStyle = txt;
      ctx.font = "600 9px monospace";
      ctx.fillText(name.toUpperCase(), PAD + 12, y + 16);
      ctx.globalAlpha = 1;
      ctx.font = "800 22px sans-serif";
      ctx.fillText(val + (unit ? ' ' + unit : ''), PAD + 12, y + 42);

      // Draw sparkline SVG
      const svgEl = card.querySelector('svg.lift-sparkline');
      if (svgEl) {
        try {
          let svgStr = new XMLSerializer().serializeToString(svgEl);
          svgStr = svgStr
            .replace(/var\(--green\)/g, green)
            .replace(/var\(--bg2\)/g, card_bg)
            .replace(/var\(--text\)/g, txt);
          const svgW = W - PAD * 2 - 24;
          const svgH = 48;
          svgStr = svgStr.replace(/<svg /, `<svg width="${svgW}" height="${svgH}" `);
          const blob = new Blob([svgStr], { type: 'image/svg+xml' });
          const url  = URL.createObjectURL(blob);
          await new Promise(res => {
            const img = new Image();
            img.onload = () => { ctx.drawImage(img, PAD + 12, y + 46, svgW, svgH); URL.revokeObjectURL(url); res(); };
            img.onerror = () => { URL.revokeObjectURL(url); res(); };
            img.src = url;
          });
        } catch(e) { /* skip sparkline */ }
      }

      y += ROW_H + GAP;
    }

    // Convert to blob and share or download
    canvas.toBlob(async (blob) => {
      if (!blob) { setStatus('Image generation failed', true); return; }
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const file = new File([blob], 'training-progress.png', { type: 'image/png' });
      if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: 'Training progress' }); }
        catch(e) { /* user cancelled */ }
      } else {
        // Desktop — download directly
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'training-progress.png';
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
      }
      if (btn) { btn.textContent = '↑ Share progress'; btn.disabled = false; }
    }, 'image/png');

  } catch(e) {
    console.error('Share error:', e);
    setStatus('Error: ' + e.message, true);
    if (btn) { btn.textContent = '↑ Share progress'; btn.disabled = false; }
  }
}

function meUpdateAge(dob) {
  if (!dob) return;
  const d = new Date(dob);
  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  if (today < new Date(today.getFullYear(), d.getMonth(), d.getDate())) age--;
  const el = document.getElementById('me-age-display');
  if (el) el.textContent = age + ' years old';
}

function meToggleChip(groupId, value, btn) {
  btn.classList.toggle('active');
}

function meGetChips(groupId) {
  return Array.from(document.querySelectorAll(`#${groupId} .me-chip.active`)).map(b => b.textContent);
}

async function logMeasurement() {
  const weight = document.getElementById('me-new-weight')?.value;
  const bf     = document.getElementById('me-new-bf')?.value;
  const notes  = document.getElementById('me-new-notes')?.value || null;
  const date   = document.getElementById('me-new-date')?.value || new Date().toISOString().split('T')[0];
  const btn    = document.getElementById('me-log-btn');
  const status = document.getElementById('me-log-status');
  if (!weight && !bf) return;

  btn.textContent = 'Saving…'; btn.disabled = true;
  status.style.display = 'none';

  try {
    await sbPost(ENV === 'production' ? 'user_measurements' : 'user_measurements_staging', {
      logged_at: date,
      weight_kg: weight ? parseFloat(weight) : null,
      body_fat_pct: bf ? parseFloat(bf) : null,
      notes
    });
    btn.textContent = 'Log measurement'; btn.disabled = false;
    status.textContent = '✓ Logged'; status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; renderMe(); }, 1500);
  } catch(e) {
    btn.textContent = 'Log measurement'; btn.disabled = false;
    status.textContent = '⚠ Error saving'; status.style.display = 'block';
  }
}

async function saveProfile() {
  const p = meProfile;
  const status = document.getElementById('me-save-status');
  const body = {
    name:                    document.getElementById('me-name')?.value || null,
    dob:                     document.getElementById('me-dob')?.value || null,
    height_cm:               parseFloat(document.getElementById('me-height')?.value) || null,
    training_days_per_week:  parseInt(document.getElementById('me-training-days')?.value) || null,
    preferred_days:          meGetChips('me-preferred-days'),
    training_window_start:   document.getElementById('me-window-start')?.value || null,
    training_window_end:     document.getElementById('me-window-end')?.value || null,
    goals:                   meGetChips('me-goals'),
    injuries:                document.getElementById('me-injuries')?.value || null,
    diet_type:               document.getElementById('me-diet-type')?.value?.trim() || null,
    fasting_window:          document.getElementById('me-fasting-window')?.value?.trim() || null,
    nutrition_notes:         document.getElementById('me-nutrition-notes')?.value?.trim() || null,
    experience_level:        document.getElementById('me-experience')?.value || null,
    equipment:               meGetChips('me-equipment'),
    gender:                  meGetChips('me-gender')[0] || null,
    nutrition_goal:          meGetGoalChip('me-nutrition-goal'),
    activity_level:          meGetGoalChip('me-activity-level'),
    updated_at:              new Date().toISOString()
  };

  // Only clear macro targets if goal or activity actually changed to a different value
  // If neither field changed, leave macro_targets completely untouched (don't include in body)
  const newGoal     = body.nutrition_goal;
  const newActivity = body.activity_level;
  const oldGoal     = meProfile?.nutrition_goal || null;
  const oldActivity = meProfile?.activity_level || null;
  const goalChanged     = newGoal     && newGoal     !== oldGoal;
  const activityChanged = newActivity && newActivity !== oldActivity;
  if (goalChanged || activityChanged) {
    // Archive previous targets before clearing
    if (meProfile?.macro_targets) {
      body.macro_targets_previous = meProfile.macro_targets;
    }
    body.macro_targets = null;
  }

  const btn = document.getElementById('me-save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  status.style.display = 'none';

  try {
    if (p.id) {
      await sbPatch(ENV === 'production' ? 'user_profile' : 'user_profile_staging', p.id, body);
    } else {
      await sbPost(ENV === 'production' ? 'user_profile' : 'user_profile_staging', body);
    }
    meProfile = { ...p, ...body };
    btn.textContent = 'Save profile'; btn.disabled = false;
    status.textContent = '✓ Saved'; status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 2500);
  } catch(e) {
    btn.textContent = 'Save profile'; btn.disabled = false;
    status.textContent = '⚠ Error saving'; status.style.display = 'block';
  }
}

function nutMd(md) {
  if (!md) return '';
  md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  const lines = md.split('\n');
  const out = []; let inList = false;
  for (const line of lines) {
    if (/^## (.+)/.test(line))      { if(inList){out.push('</ul>');inList=false;} out.push('<h2>'+line.replace(/^## /,'')+'</h2>'); }
    else if (/^### (.+)/.test(line)){ if(inList){out.push('</ul>');inList=false;} out.push('<h3>'+line.replace(/^### /,'')+'</h3>'); }
    else if (/^- (.+)/.test(line))  { if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+line.replace(/^- /,'')+'</li>'); }
    else if (line.trim()==='')      { if(inList){out.push('</ul>');inList=false;} }
    else                            { if(inList){out.push('</ul>');inList=false;} out.push('<p>'+line+'</p>'); }
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}

    }

async function nutMaybeSummarize(existingMemory) {
  // Fetch messages that aren't yet covered by the summary
  const alreadySummarized = existingMemory?.messages_summarized || 0;
  // Get total count
  const allRows = await sbGet(COACH_CONVOS_TABLE, 'select=role,content,created_at&order=created_at.asc');
  const total = allRows.length;
  if (total <= 40) return; // nothing to summarize yet
  // Summarize everything except the last 20 (which are kept as full detail)
  const toSummarize = allRows.slice(0, total - 20);
  if (toSummarize.length <= alreadySummarized) return; // already up to date
  // Call Edge Function summarize action
  const res = await fetch(COACH_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
    body: JSON.stringify({
      action: 'summarize',
      messages: toSummarize,
      existingSummary: existingMemory?.summary || '',
      memoryTable: COACH_MEMORY_TABLE,
      totalMessages: toSummarize.length
    })
  });
  const data = await res.json();
  if (data.summary) nutCoachMemory = data.summary;
}

    '**Timing:** [1-2 lines]',
    '',
    '## Notes for this week (1-3 lines — deload, recovery, patterns from logs)',
    '',
    'When Brian confirms he wants to save it, wrap the full plan in <SAVE_PLAN> tags.',
    '',
    'MODE 2 — LOG FEEDBACK (when Brian asks how he did, review his food, or asks about a specific day):',
    '- Estimate actual macros from what was logged (protein/carbs/fat in grams)',
    '- State the correct targets for that day type using the numbers above',
    '- Call out exactly what was over/under vs your derived targets, e.g. "Protein: ~85g logged vs 150g target — 65g short"',
    '- Give 2-3 simple, specific fixes: real foods, real portions, aligned with his diet profile',
    '- Flag micronutrient gaps for plant-based eating (B12, iron, omega-3, zinc)',
    '- Keep it tight — numbers first, commentary second',
    '',
    'FOR EVERYTHING ELSE: answer directly and specifically. Use recentMeasurements for weight/BF trends. Use nutritionLogs to name patterns. Build familiarity with Brian\'s food preferences from his logs.',
    '',
    'CURRENT DATA:',
    nutCoachContext,
    memorySuffix
  ].join('\n');
  try {
    const res = await fetch(COACH_PROXY_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, system:systemPrompt, messages:nutChatHistory })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || res.status);
    const reply = data.content?.[0]?.text || 'Sorry, no response.';
    document.getElementById(thinkId)?.remove();
    const planMatch    = reply.match(/<SAVE_PLAN>([\s\S]*?)<\/SAVE_PLAN>/);
    const targetsMatch = reply.match(/<SAVE_TARGETS>([\s\S]*?)<\/SAVE_TARGETS>/);
    let display = reply;
    if (planMatch) {
      display = display.replace(/<SAVE_PLAN>[\s\S]*?<\/SAVE_PLAN>/, '').trim();
      await nutSavePlan(planMatch[1].trim());
      display += '\n\n**Plan saved — check the Plan tab.**';
    }
    if (targetsMatch) {
      // Strip the tag block
      display = display.replace(/\n*<SAVE_TARGETS>[\s\S]*?<\/SAVE_TARGETS>\n*/g, '\n').trim();
      // Also strip any bare JSON blob containing protein_g that leaked into visible text
      display = display.replace(/\n*\{[^{}]*"protein_g"[^{}]*\}\n*/g, '\n').trim();
      await nutSaveMacroTargets(targetsMatch[1].trim());
      display += '\n\n**Macro targets saved.**';
    }
    nutChatHistory.push({ role:'assistant', content:reply });
    sbPost(COACH_CONVOS_TABLE, { role:'assistant', content:reply }).catch(()=>{});
    msgs.innerHTML += `<div class="nut-msg nut-msg-coach">${nutMd(display)}</div>`;
    // Plan saving is handled via SAVE_PLAN tags — no auto-prompt needed
  } catch(e) {
    document.getElementById(thinkId)?.remove();
    msgs.innerHTML += `<div class="nut-msg nut-msg-thinking">Error: ${e.message}</div>`;
  }
  sendBtn.disabled = false; sendBtn.textContent = '↑';
  msgs.scrollTop = msgs.scrollHeight;
}

async function nutSaveMacroTargets(rawStr) {
  try {
    // Extract JSON object even if coach wrapped it in text or bullet points
    const jsonMatch = rawStr.match(/\{[\s\S]*\}/);
    if (!jsonMatch) { console.warn('nutSaveMacroTargets: no JSON object found in:', rawStr); return; }
    const targets = JSON.parse(jsonMatch[0]);
    // Validate required fields are present
    const required = ['protein_g','training_carbs_g','rest_carbs_g','fat_g','training_kcal','rest_kcal'];
    const missing = required.filter(k => targets[k] === undefined);
    if (missing.length) { console.warn('nutSaveMacroTargets: missing fields:', missing); return; }
    const profileTable = ENV === 'production' ? 'user_profile' : 'user_profile_staging';
    const rows = await sbGet(profileTable, 'select=id&limit=1');
    if (!rows.length) return;
    await sbPatch(profileTable, rows[0].id, { macro_targets: targets });
    if (meProfile) meProfile.macro_targets = targets;
    console.log('Macro targets saved:', targets);
  } catch(e) {
    console.warn('Failed to save macro targets:', e.message);
  }
}

async function nutSaveLog(submit, silent=false) {
  const saveBtn   = document.getElementById('nut-save-btn');
  const submitBtn = document.getElementById('nut-submit-btn');
  const status    = document.getElementById('nut-log-status');
  if (!silent) { if(saveBtn){saveBtn.textContent='Saving…';saveBtn.disabled=true;} if(submitBtn) submitBtn.disabled=true; }
  try {
    const body = {
      date:           nutCurrentLog?.date || new Date().toISOString().slice(0,10),
      energy_level:   nutCurrentLog?.energy_level  || null,
      hunger_level:   nutCurrentLog?.hunger_level  || null,
      sleep_quality:  nutCurrentLog?.sleep_quality || null,
      break_fast_time:nutCurrentLog?.break_fast_time || null,
      hours_fasted:   nutCurrentLog?.hours_fasted  || null,
      stool_notes:    nutCurrentLog?.stool_notes   || null,
      general_notes:  nutCurrentLog?.general_notes || null,
      meal_notes:     nutCurrentLog?.meal_notes    || [],
      submitted: submit ? true : (nutCurrentLog?.submitted || false)
    };
    if (nutCurrentLog?.id) {
      await sbPatch(NUT_LOGS_TABLE, nutCurrentLog.id, body);
      nutCurrentLog = { ...nutCurrentLog, ...body };
    } else {
      const r = await fetch(`${SB_URL}/rest/v1/${NUT_LOGS_TABLE}`, {
        method:'POST',
        headers:{ ...SB_HDRS, 'Prefer':'return=representation' },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(await r.text());
      const rows = await r.json();
      nutCurrentLog = rows[0];
    }
    if (!silent) {
      if (submit) {
        // After submit, hide the form and reload the history list
        nutCurrentLog = null;
        const area = document.getElementById('nut-new-log-area');
        const btn  = document.getElementById('nut-new-log-btn');
        if (area) area.style.display = 'none';
        if (btn)  btn.style.display = '';
        nutLoadLogHistory();
        if(status){ status.textContent = '✓ Submitted'; status.style.display='block'; setTimeout(()=>{ status.style.display='none'; },2500); }
      } else {
        if(saveBtn){saveBtn.textContent='✓ Saved';saveBtn.disabled=false;setTimeout(()=>{if(saveBtn)saveBtn.textContent='Save';},2000);}
        if(submitBtn) submitBtn.disabled=false;
        if(status){ status.textContent = '✓ Saved'; status.style.display='block'; setTimeout(()=>{ status.style.display='none'; },2500); }
      }
    }
  } catch(e) {
    if (!silent) {
      if(saveBtn){saveBtn.textContent='Save';saveBtn.disabled=false;} if(submitBtn) submitBtn.disabled=false;
      if(status){ status.textContent='⚠ Error: '+e.message; status.style.display='block'; }
    }
  }
}

// Cache for in-progress edits to history logs
const nutHistEdits = {};

function nutHistToggle(id) {
  const el = document.getElementById('nhe-' + id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  // Close all others first
  document.querySelectorAll('.nut-hist-entry.open').forEach(e => e.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

function nutHistField(id, field, value) {
  if (!nutHistEdits[id]) nutHistEdits[id] = {};
  nutHistEdits[id][field] = value;
}

function nutHistSetRating(id, field, val, btn) {
  btn.closest('.nut-rating-btns').querySelectorAll('.nut-rating-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  nutHistField(id, field, val);
}

function nutHistUpdateMeal(id, idx, value) {
  if (!nutHistEdits[id]) nutHistEdits[id] = {};
  if (!nutHistEdits[id]._meals) {
    // Initialise from current DOM
    const container = document.getElementById('nhe-meals-' + id);
    nutHistEdits[id]._meals = Array.from(container.querySelectorAll('textarea')).map(t => t.value);
  }
  nutHistEdits[id]._meals[idx] = value;
}

function nutHistAddMeal(id) {
  if (!nutHistEdits[id]) nutHistEdits[id] = {};
  const container = document.getElementById('nhe-meals-' + id);
  const current = Array.from(container.querySelectorAll('textarea')).map(t => t.value);
  nutHistEdits[id]._meals = [...current, ''];
  // Re-render meals section
  const newHtml = nutHistEdits[id]._meals.map((m,i)=>`
    <div class="nut-meal-entry" style="margin-bottom:6px">
      <textarea rows="2" onchange="nutHistUpdateMeal('${id}',${i},this.value)">${nutEsc(m)}</textarea>
      <button class="nut-meal-remove" onclick="nutHistRemoveMeal('${id}',${i})">×</button>
    </div>`).join('');
  container.innerHTML = newHtml;
  const tas = container.querySelectorAll('textarea');
  if (tas.length) tas[tas.length-1].focus();
}

function nutHistRemoveMeal(id, idx) {
  const container = document.getElementById('nhe-meals-' + id);
  const current = Array.from(container.querySelectorAll('textarea')).map(t => t.value);
  current.splice(idx, 1);
  if (!nutHistEdits[id]) nutHistEdits[id] = {};
  nutHistEdits[id]._meals = current;
  const newHtml = current.map((m,i)=>`
    <div class="nut-meal-entry" style="margin-bottom:6px">
      <textarea rows="2" onchange="nutHistUpdateMeal('${id}',${i},this.value)">${nutEsc(m)}</textarea>
      <button class="nut-meal-remove" onclick="nutHistRemoveMeal('${id}',${i})">×</button>
    </div>`).join('');
  container.innerHTML = newHtml;
}

async function nutHistSave(id, submit) {
  const saveBtn   = document.getElementById('nhe-save-' + id);
  const submitBtn = document.getElementById('nhe-submit-' + id);
  const status    = document.getElementById('nhe-status-' + id);
  if (saveBtn) { saveBtn.textContent = 'Saving…'; saveBtn.disabled = true; }
  if (submitBtn) submitBtn.disabled = true;
  try {
    const edits = nutHistEdits[id] || {};
    const meals = edits._meals !== undefined ? edits._meals : null;
    const body = {};
    ['break_fast_time','hours_fasted','energy_level','hunger_level','sleep_quality','stool_notes','general_notes'].forEach(f => {
      if (edits[f] !== undefined) body[f] = edits[f];
    });
    if (meals !== null) body.meal_notes = meals;
    if (submit) body.submitted = true;
    if (!Object.keys(body).length) {
      if (saveBtn) { saveBtn.textContent = 'Save'; saveBtn.disabled = false; }
      if (submitBtn) submitBtn.disabled = false;
      return;
    }
    await sbPatch(NUT_LOGS_TABLE, id, body);
    if (saveBtn) { saveBtn.textContent = 'Save'; saveBtn.disabled = false; }
    if (submit) {
      // Re-render card so Submit button disappears and badge updates
      nutLoadLogHistory();
    } else {
      if (submitBtn) submitBtn.disabled = false;
      status.textContent = '✓ Saved'; status.style.display = 'block';
      setTimeout(() => { status.style.display = 'none'; }, 2500);
    }
    delete nutHistEdits[id];
  } catch(e) {
    if (saveBtn) { saveBtn.textContent = 'Save'; saveBtn.disabled = false; }
    if (submitBtn) submitBtn.disabled = false;
    status.textContent = '⚠ ' + e.message; status.style.display = 'block';
  }
}

function nutStepFasted(delta) {
  const el = document.getElementById('nut-hours-fasted');
  if (!el) return;
  const cur = parseFloat(el.value) || 16;
  const next = Math.min(48, Math.max(0, cur + delta));
  el.value = next;
  nutFieldChange('hours_fasted', next);
}

function nutHistStepFasted(id, delta) {
  const el = document.getElementById('nhe-fasted-' + id);
  if (!el) return;
  const cur = parseFloat(el.value) || 16;
  const next = Math.min(48, Math.max(0, cur + delta));
  el.value = next;
  nutHistField(id, 'hours_fasted', next);
}

function bodyDotClick(evt) {
  var g = evt.target.closest('.bcsdot');
  if (!g) return;
  var tipId = g.getAttribute('data-tip');
  var text  = g.getAttribute('data-val');
  if (!tipId || !text) return;
  var el = document.getElementById(tipId);
  if (!el) return;
  el.textContent = text;
  el.setAttribute('opacity', '1');
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(function() {
    el.setAttribute('opacity', '0');
    el.textContent = '';
  }, 2200);
}

// Delegate body comp dot clicks at document level
document.addEventListener('click', function(evt) {
  if (evt.target.closest && evt.target.closest('.bcsdot')) bodyDotClick(evt);
});

function nutEsc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
wakeLockEnabled = true;
requestWakeLock();
</script>
</body>
</html>
