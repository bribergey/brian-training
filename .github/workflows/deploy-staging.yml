name: Deploy Staging to GitHub Pages

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy staging HTML to legacy and app routes
        run: |
          mkdir -p gh-pages/staging/app gh-pages/staging/home
          cp brian_STAGING.html gh-pages/staging/index.html
          cp brian_STAGING.html gh-pages/staging/app/index.html
          cp marketing_STAGING.html gh-pages/staging/home/index.html

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add staging/index.html staging/app/index.html staging/home/index.html
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy staging: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
