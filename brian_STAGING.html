// ─── WAKE LOCK ────────────────────────────────────────────────────────────
let wakeLock = null;
let wakeLockEnabled = false;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return false;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLockEnabled = true;
    wakeLock.addEventListener('release', () => {
      wakeLock = null;
      // Re-acquire if user still wants it and page is visible
      if (wakeLockEnabled && document.visibilityState === 'visible') {
        requestWakeLock();
      } else {
        updateWakeLockUI(false);
      }
    });
    updateWakeLockUI(true);
    return true;
  } catch(e) {
    wakeLock = null;
    wakeLockEnabled = false;
    updateWakeLockUI(false);
    return false;
  }
}

function releaseWakeLock() {
  wakeLockEnabled = false;
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  updateWakeLockUI(false);
}

function updateWakeLockUI(active) {
  const btn   = document.getElementById('wake-lock-btn');
  const icon  = document.getElementById('wake-lock-icon');
  const label = document.getElementById('wake-lock-label');
  if (!btn) return;
  if (active) {
    btn.classList.add('active');
    icon.textContent  = '🔆';
    label.textContent = 'Awake';
  } else {
    btn.classList.remove('active');
    icon.textContent  = '🔅';
    label.textContent = 'Sleep';
  }
}

async function toggleWakeLock() {
  wakeLockEnabled = !wakeLockEnabled;
  if (wakeLockEnabled) { await requestWakeLock(); }
  else { releaseWakeLock(); }
}

// Re-acquire wake lock when tab becomes visible again (e.g. switching back from another app)
document.addEventListener('visibilitychange', () => {
  if (wakeLockEnabled && document.visibilityState === 'visible') requestWakeLock();
});

// ─── EXERCISE TIMER ──────────────────────────────────────────────────────
const timerState = {};

function timerHtml(uid) {
  return `<div class="timer-widget" id="timer-${uid}">
    <div class="timer-display" id="timer-display-${uid}">0:00.0</div>
    <button class="timer-btn" id="timer-toggle-${uid}" onclick="timerToggle('${uid}')">Start</button>
    <button class="timer-btn reset" onclick="timerReset('${uid}')">Reset</button>
  </div>`;
}

function timerToggle(uid) {
  if (!timerState[uid]) timerState[uid] = { running: false, elapsed: 0, startedAt: null };
  const t = timerState[uid];
  if (t.running) {
    clearInterval(t.interval);
    t.elapsed += Date.now() - t.startedAt;
    t.running = false;
    document.getElementById(`timer-toggle-${uid}`).textContent = 'Start';
    document.getElementById(`timer-display-${uid}`).classList.remove('running');
  } else {
    t.startedAt = Date.now();
    t.running = true;
    document.getElementById(`timer-toggle-${uid}`).textContent = 'Stop';
    document.getElementById(`timer-display-${uid}`).classList.add('running');
    t.interval = setInterval(() => {
      const totalMs = t.elapsed + Date.now() - t.startedAt;
      const total   = Math.floor(totalMs / 1000);
      const ms      = Math.floor((totalMs % 1000) / 100); // one decimal
      const m = Math.floor(total / 60);
      const s = String(total % 60).padStart(2, '0');
      const el = document.getElementById(`timer-display-${uid}`);
      if (el) el.textContent = `${m}:${s}.${ms}`;
    }, 100);
  }
}

function timerReset(uid) {
  if (timerState[uid]?.interval) clearInterval(timerState[uid].interval);
  timerState[uid] = { running: false, elapsed: 0, startedAt: null };
  const display = document.getElementById(`timer-display-${uid}`);
  const toggle  = document.getElementById(`timer-toggle-${uid}`);
  if (display) { display.textContent = '0:00.0'; display.classList.remove('running'); }
  if (toggle)  toggle.textContent = 'Start';
}

// ─── SUPERSET GROUPING ───────────────────────────────────────────────────

function renderExerciseList(exs, si) {
  let html = '';
  let i = 0;
  while (i < exs.length) {
    const ex = exs[i];
    const ssGroup = ex.superset_group || null;

    if (ssGroup) {
      // Collect all consecutive exercises in this superset group
      const groupExs = [];
      let j = i;
      while (j < exs.length && exs[j].superset_group === ssGroup) {
        groupExs.push({ ex: exs[j], i: j });
        j++;
      }
      html += `<div class="ss-group">
        <div class="ss-bar"></div>
        <div class="ss-label">Superset</div>`;
      groupExs.forEach(({ ex, i: idx }) => {
        html += buildExerciseBlock(ex, idx, si);
      });
      html += `</div>`;
      i = j;
    } else {
      html += buildExerciseBlock(ex, i, si);
      i++;
    }
  }
  return html;
}

function buildExerciseBlock(ex, i, si) {
  const exName     = ex.exercise || ex.name;
  const exUnit     = ex.unit || 'kg';
  const badgeType  = ex.badge || EX_BADGES[exName] || 'acc';
  const badgeLabel = badgeType === 'anchor' ? 'Anchor' : badgeType === 'core' ? 'Core' : badgeType === 'upper' ? 'Upper' : badgeType === 'lower' ? 'Lower' : badgeType === 'cardio' ? 'Cardio' : 'Acc';
  const desc       = ex.coach_notes || '';
  const uid        = `${si}_${i}`;
  const isInfo     = ex.rep_type === 'info';

  let html = `<div class="ex-block" id="ex-${uid}">
    <div class="ex-block-header" onclick="toggleEx('ex-${uid}')">
      <span class="ex-badge badge-${badgeType}">${badgeLabel}</span>
      <span class="ex-name">${exName}</span>
      <span class="ex-chevron">▼</span>
    </div>
    <div class="ex-body">`;

  if (desc) html += `<div class="ex-desc">${desc}</div>`;

  if (!isInfo) {
    html += buildSetRows(uid, ex, exUnit);
    html += `<div class="input-group">
    <label class="input-label">Notes</label>
    <textarea rows="2" id="n_${uid}" placeholder="optional"></textarea>
  </div>`;
  }

  html += `</div></div>`;
  return html;
}

// ─── SET-BY-SET HELPERS ──────────────────────────────────────────────────

// Detect whether an ex object uses timed reps
// (reused from isTimedExercise but works on program rows AND session exercises)
function isTimedEx(ex) {
  if (ex.rep_type) return ex.rep_type === 'sec' || ex.rep_type === 'min';
  const reps = (ex.reps || '').toLowerCase();
  const unit = (ex.unit || '').toLowerCase();
  return reps.includes('sec') || unit.includes('sec');
}

// Convert a legacy exercise object (old summary format) into a synthetic sets array
function legacyToSets(ex) {
  const sets = [];
  const numSets = parseInt(ex.sets) || 3;
  const weight  = parseFloat(ex.activationWeight || ex.weight) || 0;
  const topW    = parseFloat(ex.topWeight || ex.weight) || weight;
  const reps    = ex.topReps || ex.reps || '';

  if (ex.protocol && ex.activationWeight) {
    // Protocol: activation set, then top sets, then singles if any
    sets.push({ weight: parseFloat(ex.activationWeight), reps: reps });
    sets.push({ weight: topW, reps: reps });
    if (ex.singles && parseInt(ex.singles) > 0) {
      for (let i = 0; i < parseInt(ex.singles); i++) {
        sets.push({ weight: topW, reps: 1 });
      }
    }
    sets.push({ weight: parseFloat(ex.activationWeight), reps: reps });
  } else {
    for (let i = 0; i < numSets; i++) {
      sets.push({ weight: parseFloat(ex.weight) || 0, reps: ex.reps || '' });
    }
  }
  return { name: ex.name, exercise: ex.exercise, badge: ex.badge, unit: ex.unit, rep_type: ex.rep_type,
    reps: ex.reps, weight: ex.weight, topWeight: ex.topWeight, activationWeight: ex.activationWeight,
    protocol: ex.protocol, singles: ex.singles, coach_notes: ex.coach_notes,
    superset_group: ex.superset_group, suggested_sets: ex.suggested_sets, sets: sets };
}

// Build the set-rows HTML for an exercise
// ex can be a program row (has suggested_sets) or a session exercise (has sets array)
function buildSetRows(uid, ex, unit) {
  const isTimed = isTimedEx(ex);
  const noWeight = ex.badge === 'cardio';
  const repLabel = ex.rep_type === 'km' ? 'Distance (km)' : ex.rep_type === 'min' ? 'Time (min)' : isTimed ? 'Time (s)' : 'Reps';

  // Determine initial sets data
  let sets;
  if (Array.isArray(ex.sets) && ex.sets.length) {
    // Session exercise with saved sets
    sets = ex.sets;
  } else if (Array.isArray(ex.suggested_sets) && ex.suggested_sets.length) {
    // Program row with coach suggestions
    sets = ex.suggested_sets;
  } else {
    // Fallback: 3 empty sets
    sets = [{weight: '', reps: ''}, {weight: '', reps: ''}, {weight: '', reps: ''}];
  }

  let html = `<div class="${noWeight ? 'set-row-headers no-weight' : 'set-row-headers'}">
    <div></div>
    ${noWeight ? '' : `<div class="set-row-label">Weight (${unit || 'kg'})</div>`}
    <div class="set-row-label">${repLabel}</div>
    <div></div>
  </div>
  <div class="set-rows ${noWeight ? 'no-weight' : ''}" id="set-rows-${uid}">`;

  sets.forEach((s, j) => {
    html += buildSetRowHtml(uid, j, s.weight ?? '', s.reps ?? '', isTimed, noWeight);
  });

  html += `</div>`;

  if (isTimed) {
    html += `<div style="margin-bottom:10px"><label class="input-label">Timer</label>${timerHtml(uid)}</div>`;
  }

  html += `<button class="set-add-btn" onclick="addSet('${uid}', '${unit || 'kg'}', ${isTimed})">+ Add set</button>`;

  return html;
}

function buildSetRowHtml(uid, j, weight, reps, isTimed, noWeight) {
  const wId = `set_${uid}_${j}_w`;
  const rId = `set_${uid}_${j}_r`;
  const step = 0.5;
  return `<div class="${noWeight ? 'set-row no-weight' : 'set-row'}" id="set-row-${uid}-${j}">
    <div class="set-row-num">${j + 1}</div>
    ${noWeight ? '' : `<div>${stepperHtml(wId, weight, -999, 300, '', step)}</div>`}
    <div>${isTimed
      ? stepperHtml(rId, reps, 0, 9999, '', 1)
      : stepperHtml(rId, reps, 0, 99, '')
    }</div>
    <button class="set-remove-btn" onclick="removeSet('${uid}', ${j})">×</button>
  </div>`;
}

function addSet(uid, unit, isTimed) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return;
  const j = container.children.length;
  // Copy last set's weight as default
  const lastWEl = document.getElementById(`set_${uid}_${j-1}_w`);
  const lastW = lastWEl ? lastWEl.value : '';
  container.insertAdjacentHTML('beforeend', buildSetRowHtml(uid, j, lastW, '', isTimed));
  renumberSetRows(uid);
  saveDraftFromUid(uid);
}

function removeSet(uid, j) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container || container.children.length <= 1) return;
  const row = document.getElementById(`set-row-${uid}-${j}`);
  if (row) row.remove();
  renumberSetRows(uid);
  saveDraftFromUid(uid);
}

// Extract si from uid (format: "si_exerciseIndex") and trigger saveDraft
function saveDraftFromUid(uid) {
  const si = parseInt(uid.split('_')[0]);
  if (!isNaN(si)) saveDraft(si);
}

function renumberSetRows(uid) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return;
  Array.from(container.children).forEach((row, j) => {
    // Update ID
    row.id = `set-row-${uid}-${j}`;
    // Update set number label
    const numEl = row.querySelector('.set-row-num');
    if (numEl) numEl.textContent = j + 1;
    // Update input IDs and stepper onclick attrs
    const wInput = row.querySelector(`[id^="set_${uid}_"]`);
    const inputs = row.querySelectorAll('input[type=number]');
    if (inputs[0]) inputs[0].id = `set_${uid}_${j}_w`;
    if (inputs[1]) inputs[1].id = `set_${uid}_${j}_r`;
    // Update stepper buttons
    const btns = row.querySelectorAll('.stepper-btn');
    if (btns.length >= 2) {
      btns[0].setAttribute('onclick', `stepField('set_${uid}_${j}_w',-0.5,-999,300,0.5)`);
      btns[1].setAttribute('onclick', `stepField('set_${uid}_${j}_w',0.5,-999,300,0.5)`);
    }
    if (btns.length >= 4) {
      btns[2].setAttribute('onclick', `stepField('set_${uid}_${j}_r',-1,0,99,1)`);
      btns[3].setAttribute('onclick', `stepField('set_${uid}_${j}_r',1,0,99,1)`);
    }
    // Update remove button
    const removeBtn = row.querySelector('.set-remove-btn');
    if (removeBtn) removeBtn.setAttribute('onclick', `removeSet('${uid}', ${j})`);
  });
}

function collectSetRows(uid) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return null; // null = never rendered, don't save to draft
  return Array.from(container.children).map((_, j) => {
    const w = document.getElementById(`set_${uid}_${j}_w`)?.value ?? '';
    const r = document.getElementById(`set_${uid}_${j}_r`)?.value ?? '';
    return { weight: w === '' ? '' : parseFloat(w), reps: r === '' ? '' : parseFloat(r) };
  });
}

function restoreSetRows(uid, ex, sets) {
  const container = document.getElementById(`set-rows-${uid}`);
  if (!container) return;
  const isTimed = isTimedEx(ex);
  const unit = ex.unit || 'kg';
  // Rebuild the container with draft sets
  container.innerHTML = '';
  sets.forEach((s, j) => {
    container.insertAdjacentHTML('beforeend', buildSetRowHtml(uid, j, s.weight ?? '', s.reps ?? '', isTimed));
  });
}

// ─── SHARE LIFT CARD ─────────────────────────────────────────────────────
async function shareAllLifts() {
  const cards = document.querySelectorAll('#lift-tracker .lift-card');
  if (!cards.length) { setStatus('No lift data yet', true); return; }

  const btn = document.getElementById('share-lifts-btn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

  try {
    const scale   = 2;
    const PAD     = 20;
    const GAP     = 10;
    const ROW_H   = 96;
    const W       = 340;
    const green   = '#1adb4e';
    const bg      = '#111111';
    const card_bg = '#1e1e1e';
    const txt     = '#ffffff';
    const totalH  = PAD + 24 + 8 + (cards.length * (ROW_H + GAP)) - GAP + PAD;

    const canvas = document.createElement('canvas');
    canvas.width  = W * scale;
    canvas.height = totalH * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, totalH);

    ctx.fillStyle = txt; ctx.globalAlpha = 0.35;
    ctx.font = "700 9px monospace";
    ctx.fillText("BRIAN'S TRAINING HUB  ·  ANCHOR LIFTS", PAD, PAD + 10);
    ctx.globalAlpha = 1;

    let y = PAD + 24 + 8;

    for (const card of cards) {
      // Card bg with manual rounded rect
      const r = 8;
      ctx.fillStyle = card_bg;
      ctx.beginPath();
      ctx.moveTo(PAD + r, y);
      ctx.lineTo(W - PAD - r, y);
      ctx.arcTo(W - PAD, y, W - PAD, y + r, r);
      ctx.lineTo(W - PAD, y + ROW_H - r);
      ctx.arcTo(W - PAD, y + ROW_H, W - PAD - r, y + ROW_H, r);
      ctx.lineTo(PAD + r, y + ROW_H);
      ctx.arcTo(PAD, y + ROW_H, PAD, y + ROW_H - r, r);
      ctx.lineTo(PAD, y + r);
      ctx.arcTo(PAD, y, PAD + r, y, r);
      ctx.closePath();
      ctx.fill();

      const name = (card.querySelector('.lift-name')?.textContent || '').trim();
      const val  = (card.querySelector('.lift-val')?.textContent  || '—').trim();
      const unit = (card.querySelector('.lift-val-unit')?.textContent || '').trim();

      ctx.globalAlpha = 0.45; ctx.fillStyle = txt;
      ctx.font = "600 9px monospace";
      ctx.fillText(name.toUpperCase(), PAD + 12, y + 16);
      ctx.globalAlpha = 1;
      ctx.font = "800 22px sans-serif";
      ctx.fillText(val + (unit ? ' ' + unit : ''), PAD + 12, y + 42);

      // Draw sparkline SVG
      const svgEl = card.querySelector('svg.lift-sparkline');
      if (svgEl) {
        try {
          let svgStr = new XMLSerializer().serializeToString(svgEl);
          svgStr = svgStr
            .replace(/var\(--green\)/g, green)
            .replace(/var\(--bg2\)/g, card_bg)
            .replace(/var\(--text\)/g, txt);
          const svgW = W - PAD * 2 - 24;
          const svgH = 48;
          svgStr = svgStr.replace(/<svg /, `<svg width="${svgW}" height="${svgH}" `);
          const blob = new Blob([svgStr], { type: 'image/svg+xml' });
          const url  = URL.createObjectURL(blob);
          await new Promise(res => {
            const img = new Image();
            img.onload = () => { ctx.drawImage(img, PAD + 12, y + 46, svgW, svgH); URL.revokeObjectURL(url); res(); };
            img.onerror = () => { URL.revokeObjectURL(url); res(); };
            img.src = url;
          });
        } catch(e) { /* skip sparkline */ }
      }

      y += ROW_H + GAP;
    }

    // Convert to blob and share or download
    canvas.toBlob(async (blob) => {
      if (!blob) { setStatus('Image generation failed', true); return; }
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const file = new File([blob], 'training-progress.png', { type: 'image/png' });
      if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: 'Training progress' }); }
        catch(e) { /* user cancelled */ }
      } else {
        // Desktop — download directly
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'training-progress.png';
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
      }
      if (btn) { btn.textContent = '↑ Share progress'; btn.disabled = false; }
    }, 'image/png');

  } catch(e) {
    console.error('Share error:', e);
    setStatus('Error: ' + e.message, true);
    if (btn) { btn.textContent = '↑ Share progress'; btn.disabled = false; }
  }
}

  meMeasurements = [];
  window._historySessions = null;
  const extraCards = document.getElementById('extra-cards-container');
  if (extraCards) extraCards.innerHTML = '';
  Object.keys(_addedExercises).forEach(key => delete _addedExercises[key]);
}

async function renderMe() {
  const el = document.getElementById('me-inner');
  el.innerHTML = '<div style="color:var(--text);font-size:14px;opacity:0.5;padding:8px 0">Loading...</div>';

  if (!getActiveUserId()) {
    el.innerHTML = getAuthCardMarkup();
    return;
  }

  try {
    const [profile, measurements] = await Promise.all([
      sbGet(TABLES.profile, withUserScope('select=*&limit=1')),
      sbGet(TABLES.measurements, withUserScope('select=*&order=logged_at.desc'))
    ]);
    meProfile     = profile[0] || {};
    meMeasurements = measurements || [];
  } catch(e) {
    meProfile = {}; meMeasurements = [];
  }

  const p = meProfile;
  const latestWeight  = meMeasurements.find(m => m.weight_kg)?.weight_kg || '';
  const latestBf      = meMeasurements.find(m => m.body_fat_pct)?.body_fat_pct || '';

  // Age from DOB
  let ageStr = '';
  if (p.dob) {
    const dob = new Date(p.dob);
    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    if (today < new Date(today.getFullYear(), dob.getMonth(), dob.getDate())) age--;
    ageStr = age + ' years old';
  }

  // Chart for weight history
  const weightPoints = [...meMeasurements].reverse().filter(m => m.weight_kg);
  const bfPoints     = [...meMeasurements].reverse().filter(m => m.body_fat_pct);

  function miniSparkline(vals, unit) {
    if (vals.length === 0) return `<div style="font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.35;padding:8px 0">No data yet</div>`;
    if (vals.length === 1) {
      return `<div style="font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.4;margin-bottom:8px">1 entry · ${vals[0].date || ''}</div>`;
    }
    const W = 280, H = 60, PAD_X = 8, PAD_TOP = 20, PAD_BOT = 8;
    const vs = vals.map(p => p.v);
    const minV = Math.min(...vs), maxV = Math.max(...vs), range = maxV - minV || 1;
    const toX = i => PAD_X + (i / (vals.length - 1)) * (W - PAD_X * 2);
    const toY = v => PAD_TOP + (1 - (v - minV) / range) * (H - PAD_TOP - PAD_BOT);
    const pathD = vs.map((v, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    const dots  = vs.map((v, i) => {
      const isLast = i === vs.length - 1;
      return `<circle cx="${toX(i).toFixed(1)}" cy="${toY(v).toFixed(1)}" r="${isLast ? 4 : 3}" fill="${isLast ? 'var(--green)' : 'var(--bg2)'}" stroke="var(--green)" stroke-width="1.5"/>`;
    }).join('');
    const labels = vs.slice(0, -1).map((v, i) =>
      `<text x="${toX(i).toFixed(1)}" y="${(toY(v) - 6).toFixed(1)}" text-anchor="middle" font-size="9" fill="var(--text)" opacity="0.4" font-family="monospace">${v}${unit}</text>`
    ).join('');
    const firstDate = vals[0].date ? `<span class="lift-spark-label">${vals[0].date}</span>` : '';
    const lastDate  = vals[vals.length-1].date ? `<span class="lift-spark-label">${vals[vals.length-1].date}</span>` : '';
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="display:block;margin:4px 0 4px;overflow:visible">
      <path d="${pathD}" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>
      ${dots}${labels}
    </svg>
    <div class="lift-spark-labels" style="margin-bottom:12px">${firstDate}${lastDate}</div>`;
  }

  function multiSelect(id, options, selected) {
    return options.map(o => {
      const active = (selected || []).includes(o);
      return `<button type="button" class="me-chip${active ? ' active' : ''}" onclick="meToggleChip('${id}','${o}',this)">${o}</button>`;
    }).join('');
  }

  function timeVal(t) { return t ? t.slice(0,5) : ''; }

  el.innerHTML = `
    ${getAuthCardMarkup()}
    <div class="card" style="margin-bottom:18px">
      <div class="card-section-title">Profile</div>
      <div class="input-group" style="margin-bottom:14px">
        <label class="input-label">Name</label>
        <input type="text" id="me-name" value="${p.name||''}">
      </div>
      <div class="log-input-grid lig-2" style="margin-bottom:14px">
        <div class="input-group">
          <label class="input-label">Date of birth</label>
          <input type="date" id="me-dob" value="${p.dob||''}" class="date-picker-input" style="display:block;width:100%" onchange="meUpdateAge(this.value)">
        </div>
        <div class="input-group">
          <label class="input-label">Age</label>
          <div id="me-age-display" style="font-family:var(--display);font-size:20px;font-weight:800;color:var(--text);padding-top:6px">${ageStr || '—'}</div>
        </div>
      </div>
      <div class="log-input-grid lig-2" style="margin-bottom:14px">
        <div class="input-group">
          <label class="input-label">Height (cm)</label>

        </div>
        <div class="input-group">
          <label class="input-label">Experience</label>
          <select id="me-experience">
            ${EXPERIENCE_OPTIONS.map(o => `<option value="${o}"${p.experience_level===o?' selected':''}>${o}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="input-group" style="margin-bottom:0">
        <label class="input-label">Gender</label>
        <div class="me-chips" id="me-gender">
          ${['Male','Female'].map(o => `<button type="button" class="me-chip${p.gender===o?' active':''}" onclick="meToggleChip('me-gender','${o}',this)">${o}</button>`).join('')}
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-section-title">Body Composition</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Weight</div>
          <div style="font-family:var(--display);font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.02em">${latestWeight ? latestWeight + 'kg' : '—'}</div>
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Body Fat</div>
          <div style="font-family:var(--display);font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.02em">${latestBf ? latestBf + '%' : '—'}</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-section-title">Update Measurements</div>
      <div class="input-group" style="margin-bottom:10px">
        <label class="input-label">Date</label>
        <input type="date" id="me-new-date" value="${new Date().toISOString().split('T')[0]}" class="date-picker-input" style="display:block;width:100%">
      </div>
      <div class="log-input-grid lig-2" style="margin-bottom:10px">
        <div class="input-group">
          <label class="input-label">Weight (kg)</label>
          <input type="number" inputmode="numeric" id="me-new-weight" placeholder="e.g. 75" step="0.1">
        </div>
        <div class="input-group">
          <label class="input-label">Body fat % <span style="opacity:0.4;font-weight:400">(optional)</span></label>
          <input type="number" inputmode="numeric" id="me-new-bf" placeholder="e.g. 18" step="0.1">
        </div>
      </div>
      <div class="input-group" style="margin-bottom:14px">
        <label class="input-label">Notes (optional)</label>
        <input type="text" id="me-new-notes" placeholder="e.g. morning, fasted">
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-primary" style="flex:1" id="me-log-btn" onclick="logMeasurement()">Save</button>
        <span id="me-log-status" style="font-family:var(--mono);font-size:11px;color:var(--green);display:none">✓ Logged</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-section-title">Training</div>
      <div class="log-input-grid lig-2" style="margin-bottom:14px">
        <div class="input-group">
          <label class="input-label">Days per week</label>
          <input type="number" inputmode="numeric" id="me-training-days" value="${p.training_days_per_week||''}" min="1" max="7">
        </div>
      </div>
      <div class="input-group" style="margin-bottom:14px">
        <label class="input-label">Preferred days</label>
        <div class="me-chips" id="me-preferred-days">${multiSelect('me-preferred-days', DAYS_OPTIONS, p.preferred_days)}</div>
      </div>
      <div class="log-input-grid lig-2" style="margin-bottom:0">
        <div class="input-group">
          <label class="input-label">Training from</label>
          <input type="time" id="me-window-start" value="${timeVal(p.training_window_start)}" class="date-picker-input" style="display:block;width:100%">
        </div>
        <div class="input-group">
          <label class="input-label">To</label>
          <input type="time" id="me-window-end" value="${timeVal(p.training_window_end)}" class="date-picker-input" style="display:block;width:100%">
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-section-title">Goals</div>
      <div class="me-chips" id="me-goals">${multiSelect('me-goals', GOALS_OPTIONS, p.goals)}</div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-section-title">Health Context</div>
      <div class="input-group" style="margin-bottom:14px">
        <label class="input-label">Injuries or limitations</label>
        <textarea id="me-injuries" rows="3" style="width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--radius-xs);padding:11px 13px;font-size:16px;font-family:var(--sans);font-weight:500;color:var(--text);outline:none;resize:none" placeholder="e.g. mild lower back sensitivity">${p.injuries||''}</textarea>
      </div>
      <div class="input-group">
        <label class="input-label">Equipment access</label>
        <div class="me-chips" id="me-equipment">${multiSelect('me-equipment', EQUIPMENT_OPTIONS, p.equipment)}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-section-title">Nutrition coach</div>

      <div class="input-group" style="margin-bottom:20px">
        <label class="input-label">Current goal</label>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px" id="me-nutrition-goal">

            {v:'Very high', d:'Physically demanding lifestyle. Manual labour, very high step count, or extensive daily cardio.'}
          ].map(o => `<button type="button" class="me-goal-chip${p.activity_level===o.v?' active':''}" onclick="meSetActivity('${o.v}',this)">
            <div class="me-goal-chip-title">${o.v}</div>
            <div class="me-goal-chip-desc">${o.d}</div>
          </button>`).join('')}
        </div>
      </div>

      <div class="input-group" style="margin-bottom:14px">
        <label class="input-label">Diet type</label>
        <input type="text" id="me-diet-type" value="${p.diet_type||''}" placeholder="e.g. Plant-based, no alcohol" onchange="meDirty()">
      </div>
      <div class="input-group" style="margin-bottom:14px">
        <label class="input-label">Fasting window</label>
        <input type="text" id="me-fasting-window" value="${p.fasting_window||''}" placeholder="e.g. 16:8, eating 12:00–20:00" onchange="meDirty()">
      </div>
      <div class="input-group">
        <label class="input-label">Coach notes</label>
        <textarea rows="5" id="me-nutrition-notes" placeholder="Anything the coach should always know — goals, preferences, what works, what doesn't…" onchange="meDirty()">${p.nutrition_notes||''}</textarea>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
      <button class="btn btn-primary btn-full" id="me-save-btn" onclick="saveProfile()">Save profile</button>
      <span id="me-save-status" style="font-family:var(--mono);font-size:11px;color:var(--green);display:none;white-space:nowrap">✓ Saved</span>
    </div>

    <div class="card" style="margin-bottom:32px">
      <div class="card-section-title">About Your Program</div>
      <p style="font-size:15px;line-height:1.6;color:var(--text);opacity:0.8;margin:0 0 12px">
        Your training runs on a monthly cycle. Each month has a set of exercises chosen for that phase of your development — the same movements repeat across 4 building weeks, with weight increasing each week as you get stronger.
      </p>
      <p style="font-size:15px;line-height:1.6;color:var(--text);opacity:0.8;margin:0 0 12px">
        Week 5 of each month is a deload — same exercises, lighter load, fewer sets. This is intentional recovery time and is an important part of long-term progression, not a step back.
      </p>
      <p style="font-size:15px;line-height:1.6;color:var(--text);opacity:0.8;margin:0 0 12px">
        After you log each workout, your coach reviews your performance and writes the next week's program — adjusting weights based on what you actually lifted. If you hit all your reps cleanly, weight goes up. If something was a struggle or you flagged discomfort, the coach will hold or adjust.
      </p>
      <p style="font-size:15px;line-height:1.6;color:var(--text);opacity:0.8;margin:0">
        At the start of a new month, your coach designs a fresh program with new exercise selection to keep adaptation going. Your session notes matter — the more detail you log, the better the coaching.
      </p>
    </div>
  `;
}

function meSetGoal(val, btn) {
  document.querySelectorAll('#me-nutrition-goal .me-goal-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  meDirty();
}
function meSetActivity(val, btn) {
  document.querySelectorAll('#me-activity-level .me-goal-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  meDirty();
}
function meGetGoalChip(groupId) {
  const active = document.querySelector('#' + groupId + ' .me-goal-chip.active');
  return active ? active.querySelector('.me-goal-chip-title')?.textContent?.trim() || null : null;
}

function meUpdateAge(dob) {
  if (!dob) return;
  const d = new Date(dob);
  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  if (today < new Date(today.getFullYear(), d.getMonth(), d.getDate())) age--;
  const el = document.getElementById('me-age-display');
  if (el) el.textContent = age + ' years old';
}

function meToggleChip(groupId, value, btn) {
  btn.classList.toggle('active');
}

function meGetChips(groupId) {
  return Array.from(document.querySelectorAll(`#${groupId} .me-chip.active`)).map(b => b.textContent);
}

async function logMeasurement() {
  const weight = document.getElementById('me-new-weight')?.value;
  const bf     = document.getElementById('me-new-bf')?.value;
  const notes  = document.getElementById('me-new-notes')?.value || null;
  const date   = document.getElementById('me-new-date')?.value || new Date().toISOString().split('T')[0];
  const btn    = document.getElementById('me-log-btn');
  const status = document.getElementById('me-log-status');
  if (!weight && !bf) return;

  btn.textContent = 'Saving…'; btn.disabled = true;
  status.style.display = 'none';

  try {
    await sbPost(TABLES.measurements, {
      user_id: getActiveUserIdOrThrow(),
      logged_at: date,
      weight_kg: weight ? parseFloat(weight) : null,
      body_fat_pct: bf ? parseFloat(bf) : null,
      notes
    });
    btn.textContent = 'Log measurement'; btn.disabled = false;
    status.textContent = '✓ Logged'; status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; renderMe(); }, 1500);
  } catch(e) {
    btn.textContent = 'Log measurement'; btn.disabled = false;
    status.textContent = '⚠ Error saving'; status.style.display = 'block';
  }
}

async function saveProfile() {
  const p = meProfile;
  const status = document.getElementById('me-save-status');
  const body = {
    user_id:                 getActiveUserIdOrThrow(),
    name:                    document.getElementById('me-name')?.value || null,
    dob:                     document.getElementById('me-dob')?.value || null,
    height_cm:               parseFloat(document.getElementById('me-height')?.value) || null,
    training_days_per_week:  parseInt(document.getElementById('me-training-days')?.value) || null,
    preferred_days:          meGetChips('me-preferred-days'),
    training_window_start:   document.getElementById('me-window-start')?.value || null,
    training_window_end:     document.getElementById('me-window-end')?.value || null,
    goals:                   meGetChips('me-goals'),
    injuries:                document.getElementById('me-injuries')?.value || null,
    diet_type:               document.getElementById('me-diet-type')?.value?.trim() || null,
    fasting_window:          document.getElementById('me-fasting-window')?.value?.trim() || null,
    nutrition_notes:         document.getElementById('me-nutrition-notes')?.value?.trim() || null,
    experience_level:        document.getElementById('me-experience')?.value || null,
    equipment:               meGetChips('me-equipment'),
    gender:                  meGetChips('me-gender')[0] || null,
    nutrition_goal:          meGetGoalChip('me-nutrition-goal'),
    activity_level:          meGetGoalChip('me-activity-level'),
    updated_at:              new Date().toISOString()
  };

  const btn = document.getElementById('me-save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  status.style.display = 'none';

  try {
    if (p.id) {
      await sbPatch(TABLES.profile, p.id, body, withUserScope());
    } else {
      await sbPost(TABLES.profile, body);
    }
    meProfile = { ...p, ...body };
    btn.textContent = 'Save profile'; btn.disabled = false;
    status.textContent = '✓ Saved'; status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 2500);
  } catch(e) {
    btn.textContent = 'Save profile'; btn.disabled = false;
    status.textContent = '⚠ Error saving'; status.style.display = 'block';
  }
}

async function sendSignInLink() {
  const email = document.getElementById('auth-email-input')?.value?.trim();
  const btn = document.getElementById('auth-email-link-btn');
  if (!email) {
    setStatus('Enter an email first', true);
    return;
  }

  const client = getAuthClient();
  if (!client) {
    setStatus('Auth client unavailable', true);
    return;
  }
  if (!isExpectedAuthPageUrl()) {
    setStatus(`Open ${AUTH_REDIRECT_URL} before sending an email link`, true);
    return;
  }

  try {
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Sending...';
    }
    const { error } = await client.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: AUTH_REDIRECT_URL,
        shouldCreateUser: false
      }
    });
    if (error) throw error;
    setStatus('Magic link sent. Check your email.');
  } catch (e) {
    console.error('Sign-in link failed:', e);
    setStatus(e?.message || 'Sign-in link failed', true);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Email link';
    }
  }
}

async function signOutUser() {
  const client = getAuthClient();
  if (!client) return;
  try {
    const { error } = await client.auth.signOut();
    if (error) throw error;
    window.location.reload();
  } catch (e) {
    console.error('Sign-out failed:', e);
    setStatus('Sign-out failed', true);
  }
}

function bodyDotClick(evt) {
  var g = evt.target.closest('.bcsdot');
  if (!g) return;
  var tipId = g.getAttribute('data-tip');
  var text  = g.getAttribute('data-val');
  if (!tipId || !text) return;
  var el = document.getElementById(tipId);
  if (!el) return;
  el.textContent = text;
  el.setAttribute('opacity', '1');
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(function() {
    el.setAttribute('opacity', '0');
    el.textContent = '';
  }, 2200);
}

// Delegate body comp dot clicks at document level
document.addEventListener('click', function(evt) {
  if (evt.target.closest && evt.target.closest('.bcsdot')) bodyDotClick(evt);
});

getAuthClient()?.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'USER_UPDATED') {
    refreshAppForAuthChange();
  }
});

init();
wakeLockEnabled = true;
requestWakeLock();
</script>
